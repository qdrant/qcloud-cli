version: "2"

linters:
  enable:
    - bodyclose
    - containedctx
    - contextcheck
    - errorlint
    - goconst
    - godot
    - importas
    - modernize
    - nilerr
    - promlinter
    - revive
    - sloglint
    - testifylint
    - unparam
    - usestdlibvars
    - wsl_v5
  settings:
    revive:
      rules:
        - name: exported
    wsl_v5:
      default: none
      enable:
        - after-block
        - err
  exclusions:
    presets:
      - std-error-handling
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard # Standard section: captures all standard packages.
        - default # Default section: contains all imports that could not be matched to another section type.
        - prefix(github.com/qdrant) # Custom section: groups all imports with the specified Prefix (our company, but our own component).
        - prefix(github.com/qdrant/qcloud-cli/) # Custom section: groups all imports with the specified Prefix (this component).
