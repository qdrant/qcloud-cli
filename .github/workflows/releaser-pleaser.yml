name: releaser-pleaser

on:
  push:
    branches: [main]
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types:
      - edited
      - labeled
      - unlabeled

concurrency:
  group: releaser-pleaser
  cancel-in-progress: true

jobs:
  releaser-pleaser:
    # Do not run on forks.
    if: github.repository == 'qdrant/qcloud-cli'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: releaser-pleaser
        uses: apricote/releaser-pleaser@93a3e2c401320206dcd9a9b7a5bbc0850072b3c6 # v0.9.0
        with:
          token: ${{ secrets.RELEASER_PLEASER_TOKEN }} # zizmor: ignore[secrets-outside-env]
          extra-files: |
            cmd/qcloud/main.go
