name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

env:
  GOTOOLCHAIN: local

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up tools
        uses: jdx/mise-action@v3
        with:
          version: 2026.3.8 # renovate: datasource=github-releases depName=jdx/mise

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # golangci-lint was already installed in a previous step.
          install-mode: none

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up tools
        uses: jdx/mise-action@v3
        with:
          version: 2026.3.8 # renovate: datasource=github-releases depName=jdx/mise

      - name: Run tests
        run: go test -coverpkg=./internal/... -coverprofile=build/coverage.txt -v -race ./...

  go-mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up tools
        uses: jdx/mise-action@v3
        with:
          version: 2026.3.8 # renovate: datasource=github-releases depName=jdx/mise

      - name: Run go mod tidy
        run: go mod tidy

      - name: Check uncommitted changes
        run: git diff --exit-code

      - if: failure()
        run: echo "::error::Check failed, please run 'go mod tidy' and commit the changes."
